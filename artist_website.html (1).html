<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Artist Website</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('https://images.pexels.com/photos/414645/pexels-photo-414645.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940');
            background-size: cover;
            background-position: center;
            font-family: 'Pacifico', cursive, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 120px;
        }
        #title {
            font-size: 3.5em;
            margin: 40px 10px 10px 10px;
            user-select: none;
            transition: color 0.5s ease;
            text-align: center;
            max-width: 90vw;
            word-break: break-word;
        }
        button {
            padding: 12px 25px;
            margin: 12px 8px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            font-weight: bold;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.5);
            transition: background-color 0.3s ease;
            user-select: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        button:hover {
            background-color: #2980b9;
        }
        #commentBox {
            display: none;
        }
        #fileInput {
            display: none;
        }
        .social-icons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .social-icons img {
            width: 40px;
            height: 40px;
            cursor: pointer;
            filter: drop-shadow(0 0 2px black);
            transition: transform 0.3s ease;
        }
        .social-icons img:hover {
            transform: scale(1.2);
        }
        #youtubeChannel, #subscribeBtn {
            margin-top: 25px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #ff0000;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.6);
            cursor: pointer;
            user-select: none;
            color: white;
            font-family: 'Pacifico', cursive;
            text-decoration: none;
        }
        #subscribeBtn {
            background-color: #cc0000;
            margin-left: 15px;
            box-shadow: 0 4px 10px rgba(204, 0, 0, 0.6);
        }

        /* Posts container and post styling */
        #postsContainer {
            margin-top: 35px;
            width: 90vw;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            user-select: text;
        }
        .post {
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 0 15px rgba(255 255 255 / 0.2);
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 20px;
        }
        .post-left {
            flex: 1 1 320px;
            max-width: 320px;
        }
        .post-left img.post-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            display: block;
            object-fit: contain;
        }
        .post-right {
            flex: 2 1 460px;
            display: flex;
            flex-direction: column;
        }
        .post-title {
            font-size: 1.8em;
            margin-bottom: 15px;
            font-weight: bold;
            word-break: break-word;
            color: #f5c518;
            font-family: 'Pacifico', cursive;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            margin-bottom: 10px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 15px;
        }
        .post-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .post-links a {
            color: #f5c518;
            background: rgba(255 255 255 / 0.15);
            padding: 8px 15px;
            border-radius: 25px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.3s ease;
            user-select: none;
        }
        .post-links a:hover {
            background: #f5c518;
            color: black;
        }
        .post-like-button {
            align-self: flex-start;
            font-size: 1.8em;
            color: #e74c3c;
            cursor: pointer;
            user-select: none;
            border: none;
            background: transparent;
            transition: transform 0.3s ease;
            padding: 2px 10px 0 0;
        }
        .post-like-button.liked {
            transform: scale(1.3);
            filter: drop-shadow(0 0 5px #e74c3c);
        }

        .emoji-burst {
            position: fixed;
            font-size: 2rem;
            animation: burst 1s ease forwards;
            pointer-events: none;
            user-select: none;
            z-index: 9999;
        }
        @keyframes burst {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.5);
            }
        }

        /* Modal styles */
        #postModalOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            padding: 20px;
        }
        #postModal {
            background: rgba(20,20,20,0.95);
            border-radius: 20px;
            padding: 30px 30px 40px 30px;
            width: 400px;
            max-width: 95vw;
            box-shadow: 0 0 30px rgba(255 255 255 / 0.3);
            color: white;
            font-family: Arial, sans-serif;
            position: relative;
        }
        #postModal h2 {
            margin-top: 0;
            font-family: 'Pacifico', cursive;
            text-align: center;
            color: #f5c518;
            margin-bottom: 20px;
        }
        #postModal label {
            display: block;
            margin: 15px 0 6px 0;
            font-weight: bold;
        }
        #postModal input[type="text"],
        #postModal input[type="url"],
        #postModal input[type="file"] {
            width: 100%;
            padding: 8px;
            border-radius: 10px;
            border: none;
            font-size: 1em;
            outline: none;
            box-sizing: border-box;
            background-color: #222;
            color: white;
        }
        #postModal button {
            margin-top: 25px;
            width: 100%;
            font-size: 1.1em;
            border-radius: 30px;
            background-color: #f5c518;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            user-select: none;
        }
        #postModal button:hover {
            background-color: #d4af37;
        }
        #postModalClose {
            position: absolute;
            top: 15px;
            right: 25px;
            background: transparent;
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            user-select: none;
        }
        #uploadPreview {
            margin-top: 15px;
            max-width: 100%;
            max-height: 180px;
            border-radius: 15px;
            display: none;
            object-fit: contain;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
        }

        @media (max-width: 480px) {
            #postModal {
                width: 95vw;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <h1 id="title">ARUN JANGIR - ART GALLERY</h1>

    <button id="uploadBtn" title="अपनी ड्रॉइंग / फोटो अपलोड करें">अपलोड</button>
    <input type="file" id="fileInput" accept="image/*" />

    <button id="complaintBtn" title="कंप्लेंट भेजें">कंप्लेंट</button>

    <button id="likeBtn" title="लाइक करें">❤️</button>

    <div style="margin-top:20px;">
        <a id="youtubeChannel" href="https://www.youtube.com/channel/UCY5Sr-xtMo7Kar009JtSFPw" target="_blank" rel="noopener noreferrer" title="YouTube Channel">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/42/YouTube_icon_%282013-2017%29.png" alt="YouTube" width="30" height="30" />
            YouTube चैनल
        </a>
        <button id="subscribeBtn" title="सब्सक्राइब करें">सब्सक्राइब</button>
    </div>

    <div class="social-icons" aria-label="सोशल मीडिया लिंक">
        <a href="https://www.instagram.com/jangra_ji_900?igsh=MW9jYzhnZ3FpMWNrbA==" target="_blank" rel="noopener noreferrer" title="Instagram">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/120px-Instagram_logo_2016.svg.png" alt="Instagram" />
        </a>
        <a href="https://www.facebook.com/share/1FyHQZxjAX/" target="_blank" rel="noopener noreferrer" title="Facebook">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook" />
        </a>
    </div>

    <div id="postsContainer" aria-live="polite" aria-label="पोस्ट्स"></div>

    <!-- Post creation modal -->
    <div id="postModalOverlay" role="dialog" aria-modal="true" aria-labelledby="postModalTitle">
        <div id="postModal">
            <button id="postModalClose" aria-label="Close">&times;</button>
            <h2 id="postModalTitle">नई पोस्ट क्रिएट करें</h2>
            <form id="postForm">
                <label for="drawingFile">ड्रॉइंग फोटो (4K गुणवत्ता के लिए उच्च गुणवत्ता चुनें):</label>
                <input type="file" id="drawingFile" required accept="image/*" />

                <img id="uploadPreview" alt="ड्रॉइंग प्रिव्यू" />

                <label for="postTitle">पोस्ट का टाइटल:</label>
                <input type="text" id="postTitle" placeholder="पोस्ट का शीर्षक लिखें" maxlength="100" required />

                <label for="youtubeTutorialUrl">ट्यूटोरियल YouTube वीडियो लिंक:</label>
                <input type="url" id="youtubeTutorialUrl" placeholder="https://www.youtube.com/watch?v=..." required />

                <label for="videoDownloadUrl">वीडियो डाउनलोड लिंक (4K क्वालिटी वीडियो):</label>
                <input type="url" id="videoDownloadUrl" placeholder="डाउनलोड लिंक यहाँ डालें" required />

                <button type="submit">पोस्ट क्रिएट करें</button>
            </form>
        </div>
    </div>

<script>
    const title = document.getElementById("title");
    const uploadBtn = document.getElementById("uploadBtn");
    const complaintBtn = document.getElementById("complaintBtn");
    const likeBtn = document.getElementById("likeBtn");
    const subscribeBtn = document.getElementById("subscribeBtn");
    const youtubeChannel = document.getElementById("youtubeChannel");

    const instagramIcon = document.querySelector(".social-icons a[title='Instagram']");
    const facebookIcon = document.querySelector(".social-icons a[title='Facebook']");

    const postModalOverlay = document.getElementById('postModalOverlay');
    const postModalClose = document.getElementById('postModalClose');
    const postForm = document.getElementById('postForm');
    const drawingFileInput = document.getElementById('drawingFile');
    const uploadPreview = document.getElementById('uploadPreview');
    const postsContainer = document.getElementById('postsContainer');

    let selectedImageDataURL = null;

    // Title random color changer
    function getRandomColor() {
        return '#' + Math.floor(Math.random()*16777215).toString(16);
    }
    function changeTitleColor() {
        title.style.color = getRandomColor();
    }
    changeTitleColor();
    setInterval(changeTitleColor, 1500);

    // Upload button with password to open post creation modal
    uploadBtn.addEventListener('click', () => {
        const pass = prompt("कृपया पासवर्ड दर्ज करें:");
        if (pass === 'AKJ900') {
            openPostModal();
        } else {
            alert("गलत पासवर्ड!");
        }
        playRandomSound();
        showEmojis(uploadBtn);
    });

    function openPostModal() {
        postModalOverlay.style.display = 'flex';
        clearPostForm();
    }
    function closePostModal() {
        postModalOverlay.style.display = 'none';
    }
    postModalClose.addEventListener('click', closePostModal);
    postModalOverlay.addEventListener('click', (e) => {
        if (e.target === postModalOverlay) {
            closePostModal();
        }
    });

    // Image preview on file selection
    drawingFileInput.addEventListener('change', () => {
        const file = drawingFileInput.files[0];
        if(file){
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedImageDataURL = e.target.result;
                uploadPreview.src = selectedImageDataURL;
                uploadPreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        } else {
            selectedImageDataURL = null;
            uploadPreview.src = '';
            uploadPreview.style.display = 'none';
        }
    });

    // Validate youtube url and extract video ID
    function getYouTubeVideoID(url) {
        const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    // Create post element and add to DOM
    function createPost({imageSrc, titleText, tutorialVideoID, videoDownloadURL}){
        const postDiv = document.createElement('div');
        postDiv.className = 'post';

        const postLeft = document.createElement('div');
        postLeft.className = 'post-left';

        const img = document.createElement('img');
        img.className = 'post-image';
        img.src = imageSrc;
        img.alt = 'ड्रॉइंग फोटो';

        postLeft.appendChild(img);

        const postRight = document.createElement('div');
        postRight.className = 'post-right';

        const titleEl = document.createElement('div');
        titleEl.className = 'post-title';
        titleEl.textContent = titleText;

        const videoWrapper = document.createElement('div');
        videoWrapper.className = 'video-wrapper';
        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${tutorialVideoID}?rel=0`;
        iframe.allowFullscreen = true;
        iframe.title = `Tutorial video for ${titleText}`;
        videoWrapper.appendChild(iframe);

        const linksDiv = document.createElement('div');
        linksDiv.className = 'post-links';

        const youtubeLink = document.createElement('a');
        youtubeLink.href = `https://www.youtube.com/watch?v=${tutorialVideoID}`;
        youtubeLink.target = '_blank';
        youtubeLink.rel = 'noopener noreferrer';
        youtubeLink.textContent = 'ट्यूटोरियल देखें';

        const downloadLink = document.createElement('a');
        downloadLink.href = videoDownloadURL;
        downloadLink.target = '_blank';
        downloadLink.rel = 'noopener noreferrer';
        downloadLink.textContent = 'वीडियो डाउनलोड करें';

        linksDiv.appendChild(youtubeLink);
        linksDiv.appendChild(downloadLink);

        const likeBtn = document.createElement('button');
        likeBtn.className = 'post-like-button';
        likeBtn.title = 'लाइक करें';
        likeBtn.innerHTML = '❤️';
        likeBtn.addEventListener('click', () => {
            if (!likeBtn.classList.contains('liked')) {
                likeBtn.classList.add('liked');
                alert('आपने इस पोस्ट को लाइक किया!');
            } else {
                likeBtn.classList.remove('liked');
                alert('आपने लाइक हटा दिया।');
            }
            playRandomSound();
            showEmojis(likeBtn);
        });

        postRight.appendChild(titleEl);
        postRight.appendChild(videoWrapper);
        postRight.appendChild(linksDiv);
        postRight.appendChild(likeBtn);

        postDiv.appendChild(postLeft);
        postDiv.appendChild(postRight);

        postsContainer.prepend(postDiv);
    }

    // Clear post form inputs
    function clearPostForm(){
        postForm.reset();
        uploadPreview.src = '';
        uploadPreview.style.display = 'none';
        selectedImageDataURL = null;
    }

    // Handle post form submit
    postForm.addEventListener('submit', e => {
        e.preventDefault();

        const titleText = document.getElementById('postTitle').value.trim();
        const youtubeUrl = document.getElementById('youtubeTutorialUrl').value.trim();
        const videoDownloadUrl = document.getElementById('videoDownloadUrl').value.trim();

        if (!selectedImageDataURL) {
            alert('कृपया ड्रॉइंग फोटो अपलोड करें।');
            return;
        }
        if (!titleText || titleText.length === 0) {
            alert('कृपया पोस्ट का टाइटल दर्ज करें।');
            return;
        }
        const tutorialVideoID = getYouTubeVideoID(youtubeUrl);
        if (!tutorialVideoID) {
            alert('कृपया सही YouTube ट्यूटोरियल लिंक दर्ज करें।');
            return;
        }
        if (!videoDownloadUrl || !videoDownloadUrl.startsWith('http')) {
            alert('कृपया सही वीडियो डाउनलोड लिंक डालें।');
            return;
        }
        createPost({
            imageSrc: selectedImageDataURL,
            titleText: titleText,
            tutorialVideoID: tutorialVideoID,
            videoDownloadURL: videoDownloadUrl
        });
        clearPostForm();
        closePostModal();
        alert('पोस्ट सफलतापूर्वक बनाया गया!');
    });

    // Close modal
    function closePostModal(){
        postModalOverlay.style.display = 'none';
    }

    // Event listeners to close modal
    postModalClose.addEventListener('click', closePostModal);
    postModalOverlay.addEventListener('click', e => {
        if(e.target === postModalOverlay) {
            closePostModal();
        }
    });

    // Emoji and sound on clicks
    function showEmojis(element) {
        const emojiArr = ['🎉','✨','🔥','💥','🌟','🎈','💖','🎨'];
        const emoji = document.createElement("span");
        emoji.classList.add("emoji-burst");
        emoji.style.left = (element.getBoundingClientRect().left + element.offsetWidth/2) + "px";
        emoji.style.top = (element.getBoundingClientRect().top - 10) + "px";
        emoji.innerText = emojiArr[Math.floor(Math.random()*emojiArr.length)];
        document.body.appendChild(emoji);
        setTimeout(() => {
            emoji.remove();
        }, 1000);
    }

    const sounds = [
        'https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg',
        'https://actions.google.com/sounds/v1/alarms/beep_short.ogg',
        'https://actions.google.com/sounds/v1/cartoon/clang.ogg',
        'https://actions.google.com/sounds/v1/cartoon/pop.ogg'
    ];

    function playRandomSound() {
        const audio = new Audio(sounds[Math.floor(Math.random()*sounds.length)]);
        audio.volume = 0.4;
        audio.play();
    }

    // Other buttons and social links handlers for sound and emojis
    document.getElementById('complaintBtn').addEventListener('click', () => {
        window.location.href = 'mailto:your_email@example.com';
        playRandomSound();
        showEmojis(document.getElementById('complaintBtn'));
    });
    document.getElementById('likeBtn').addEventListener('click', function () {
        if (!this.classList.contains('liked')) {
            this.classList.add('liked');
            alert('आपने इस पोस्ट को लाइक किया!');
        } else {
            this.classList.remove('liked');
            alert('आपने लाइक हटा दिया।');
        }
        playRandomSound();
        showEmojis(this);
    });
    document.getElementById('subscribeBtn').addEventListener('click', () => {
        window.open('https://www.youtube.com/channel/UCY5Sr-xtMo7Kar009JtSFPw', '_blank');
        playRandomSound();
        showEmojis(document.getElementById('subscribeBtn'));
    });
    document.getElementById('youtubeChannel').addEventListener('click', () => {
        playRandomSound();
        showEmojis(document.getElementById('youtubeChannel'));
    });
    document.querySelector(".social-icons a[title='Instagram']").addEventListener('click', () => {
        playRandomSound();
        showEmojis(document.querySelector(".social-icons a[title='Instagram']"));
    });
    document.querySelector(".social-icons a[title='Facebook']").addEventListener('click', () => {
        playRandomSound();
        showEmojis(document.querySelector(".social-icons a[title='Facebook']"));
    });
</script>

<!-- Post creation modal HTML -->

        <button id="postModalClose" aria-label="Close">&times;</button>

            <label for="drawingFile">ड्रॉइंग फोटो (4K गुणवत्ता के लिए उच्च गुणवत्ता चुनें):</label>
            <input type="file" id="drawingFile" required accept="image/*" />

            <img id="uploadPreview" alt="ड्रॉइंग प्रिव्यू" />

            <label for="videoDownloadUrl">वीडियो डाउनलोड लिंक (4K क्वालिटी वीडियो):</label>

            <button type="submit">पोस्ट क्रिएट करें</button>
        </form>
    </div>
</div>
</body>
</html>
